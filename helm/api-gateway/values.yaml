replicaCount: 1
fullnameOverride: "api-gateway"

image:
  repository: xlen911/api-gateway
  pullPolicy: Always
  tag: latest

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: false

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi